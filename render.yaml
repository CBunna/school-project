# Render deployment configuration for Beskydy Tourism Website

services:
  # Backend API
  - type: web
    name: beskydy-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: beskydy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://beskydy-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: beskydy-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: echo "No build needed for static site"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # PostgreSQL Database
  - name: beskydy-db
    databaseName: beskydy_tourism
    plan: free
    region: frankfurt
